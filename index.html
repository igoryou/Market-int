<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Market Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e4e9;
            --muted: #6b7280;
            --accent: #4f8eff;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* atmospheric bg — exact deepseek feel */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 70%;
            height: 80%;
            background: radial-gradient(ellipse at top right, rgba(55, 90, 210, 0.2) 0%, rgba(70, 50, 190, 0.1) 30%, transparent 65%);
            pointer-events: none;
        }

        /* HOME STATE */
        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .home-title {
            font-size: 30px;
            font-weight: 300;
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 32px;
            color: #c9cdd4;
            line-height: 1.35;
        }

        .home-title strong {
            font-weight: 500;
            color: var(--text);
        }

        .home-title em {
            font-style: italic;
        }

        /* INPUT BOX */
        .input-box {
            width: 100%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: rgba(255, 255, 255, 0.17);
        }

        textarea {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            padding: 16px 18px 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 300;
            resize: none;
            min-height: 52px;
            max-height: 160px;
            line-height: 1.65;
        }

        textarea::placeholder {
            color: #3d4553;
        }

        .input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px 12px;
        }

        .pills {
            display: flex;
            gap: 5px;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }

        .pill:hover {
            border-color: rgba(255, 255, 255, 0.14);
            color: #9ca3af;
        }

        .pill.on {
            border-color: rgba(79, 142, 255, 0.3);
            color: var(--accent);
            background: rgba(79, 142, 255, 0.06);
        }

        .send-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.09);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .send-btn svg {
            color: #4b5563;
            transition: color 0.15s;
        }

        .send-btn:hover {
            background: rgba(255, 255, 255, 0.11);
        }

        .send-btn.ready {
            background: var(--accent);
            border-color: var(--accent);
        }

        .send-btn.ready svg {
            color: white;
        }

        .hint {
            margin-top: 11px;
            font-size: 11.5px;
            color: #2d3340;
        }

        /* CHAT VIEW */
        #chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 52px 0 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.05) transparent;
        }

        .msg-wrap {
            max-width: 660px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .msg {
            margin-bottom: 30px;
            animation: up 0.22s ease both;
        }

        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-label {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #2e3541;
            margin-bottom: 8px;
        }

        .msg.user .msg-text {
            display: inline-block;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 14px;
            font-weight: 300;
            color: #c9cdd4;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* RESULT LAYOUT */
        .result {
            font-size: 13.5px;
            font-weight: 300;
            color: #9ca3af;
        }

        .result-summary {
            font-size: 14px;
            color: #b0b7c3;
            line-height: 1.75;
            margin-bottom: 24px;
            font-weight: 300;
        }

        .result-block {
            margin-bottom: 20px;
        }

        .result-block-title {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #2e3541;
            margin-bottom: 10px;
            padding-bottom: 7px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .kv-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            gap: 12px;
        }

        .kv-row:last-child {
            border: none;
        }

        .kv-key {
            color: #4b5563;
            flex-shrink: 0;
        }

        .kv-val {
            color: #d1d5db;
            text-align: right;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #6b7280;
        }

        .bar-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .bar-name {
            width: 140px;
            color: #4b5563;
            font-size: 12.5px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bar-track {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: rgba(79, 142, 255, 0.45);
            border-radius: 2px;
        }

        .bar-pct {
            width: 28px;
            text-align: right;
            color: #374151;
            font-size: 11.5px;
        }

        .rec-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .rec {
            padding-left: 14px;
            position: relative;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.6;
        }

        .rec::before {
            content: '—';
            position: absolute;
            left: 0;
            color: #2d3340;
        }

        /* TYPING */
        .typing {
            display: flex;
            gap: 5px;
            padding: 4px 0;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #2e3541;
            animation: blink 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: .3;
            }

            40% {
                opacity: 1;
            }
        }

        /* CHAT INPUT */
        #chat-input-area {
            padding: 14px 20px 22px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
        }

        .chat-input-inner {
            max-width: 660px;
            margin: 0 auto;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- HOME -->
    <div id="home">
        <p class="home-title">
            <strong>Market Intelligence</strong> — entenda o<br>
            mercado da sua <em>região</em> antes de agir
        </p>

        <div class="input-box">
            <textarea id="home-input" placeholder="Descreva seu negócio, produto ou ideia e a região..." rows="1"
                oninput="resize(this); ready(this,'home-send')" onkeydown="hotkey(event,'home')"></textarea>
            <div class="input-footer">
                <div class="pills">
                    <button class="pill on" onclick="this.classList.toggle('on')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        Deep Analyze
                    </button>
                    <button class="pill" onclick="this.classList.toggle('on')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                            <circle cx="12" cy="9" r="2.5" />
                        </svg>
                        Região
                    </button>
                    <button class="pill" onclick="this.classList.toggle('on')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                            <polyline points="17 6 23 6 23 12" />
                        </svg>
                        Trends
                    </button>
                </div>
                <button class="send-btn" id="home-send" onclick="start()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
        </div>
        <p class="hint">Enter para enviar · Shift+Enter para nova linha</p>
    </div>

    <!-- CHAT -->
    <div id="chat-view">
        <div id="messages">
            <div class="msg-wrap" id="msg-wrap"></div>
        </div>

        <div id="chat-input-area">
            <div class="chat-input-inner">
                <div class="input-box">
                    <textarea id="chat-input" placeholder="Continue a análise ou faça uma nova pergunta..." rows="1"
                        oninput="resize(this); ready(this,'chat-send')" onkeydown="hotkey(event,'chat')"></textarea>
                    <div class="input-footer">
                        <div class="pills">
                            <button class="pill on" onclick="this.classList.toggle('on')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                                Deep Analyze
                            </button>
                            <button class="pill" onclick="this.classList.toggle('on')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                                    <circle cx="12" cy="9" r="2.5" />
                                </svg>
                                Região
                            </button>
                            <button class="pill" onclick="this.classList.toggle('on')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2">
                                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                                    <polyline points="17 6 23 6 23 12" />
                                </svg>
                                Trends
                            </button>
                        </div>
                        <button class="send-btn" id="chat-send" onclick="send()">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Aponta para o backend local (server.js)
        const API = '/api/chat';

        let history = [];
        let busy = false;

        function resize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        function ready(el, id) {
            document.getElementById(id).classList.toggle('ready', el.value.trim() !== '');
        }

        function hotkey(e, ctx) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                ctx === 'home' ? start() : send();
            }
        }

        function start() {
            const v = document.getElementById('home-input').value.trim();
            if (!v) return;
            document.getElementById('home').style.display = 'none';
            const cv = document.getElementById('chat-view');
            cv.style.display = 'flex';
            process(v);
        }

        function send() {
            if (busy) return;
            const el = document.getElementById('chat-input');
            const v = el.value.trim();
            if (!v) return;
            el.value = ''; el.style.height = 'auto';
            document.getElementById('chat-send').classList.remove('ready');
            process(v);
        }

        function addMsg(role, html) {
            const wrap = document.getElementById('msg-wrap');
            const d = document.createElement('div');
            d.className = 'msg ' + role;
            d.innerHTML = `<div class="msg-label">${role === 'user' ? 'Você' : 'Nexus'}</div>${html}`;
            wrap.appendChild(d);
            scroll();
            return d;
        }

        function scroll() {
            const m = document.getElementById('messages');
            setTimeout(() => m.scrollTop = m.scrollHeight, 30);
        }

        async function process(text) {
            if (busy) return;
            busy = true;

            history.push({ role: 'user', content: text });
            addMsg('user', `<div class="msg-text">${esc(text)}</div>`);

            // Typing indicator
            const wrap = document.getElementById('msg-wrap');
            const td = document.createElement('div');
            td.className = 'msg ai';
            td.innerHTML = `<div class="msg-label">Nexus</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            wrap.appendChild(td); scroll();

            let raw = '';

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history }),
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                td.remove();

                // Create AI message container for streaming
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerHTML = `<div class="msg-label">Nexus</div><div class="stream-raw" style="font-size:13px;color:#374151;font-weight:300;line-height:1.6"></div>`;
                wrap.appendChild(aiDiv);
                const streamEl = aiDiv.querySelector('.stream-raw');

                // Read SSE stream
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.slice(6).trim();
                        if (payload === '[DONE]') continue;
                        try {
                            const { delta } = JSON.parse(payload);
                            raw += delta;
                            // Show raw streaming text while receiving
                            streamEl.textContent = raw;
                            scroll();
                        } catch { }
                    }
                }

                // Parse final JSON and render
                history.push({ role: 'assistant', content: raw });
                let parsed = null;
                try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); } catch { }

                if (parsed) {
                    aiDiv.querySelector('.stream-raw').remove();
                    const resultDiv = document.createElement('div');
                    resultDiv.innerHTML = render(parsed);
                    aiDiv.appendChild(resultDiv);
                    scroll();
                }

            } catch (err) {
                td.remove();
                addMsg('ai', `<div class="msg-text" style="color:#4b5563">Erro: ${esc(err.message)}</div>`);
            }

            busy = false;
        }

        function render(d) {
            const chips = arr => (arr || []).map(x => `<span class="chip">${x}</span>`).join('');
            const kvs = obj => Object.entries(obj || {})
                .filter(([, v]) => v)
                .map(([k, v]) => `<div class="kv-row"><span class="kv-key">${labels[k] || k}</span><span class="kv-val">${v}</span></div>`)
                .join('');
            const bars = (d.concorrentes || []).map(c =>
                `<div class="bar-item">
      <span class="bar-name">${c.nome}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${c.forca}%"></div></div>
      <span class="bar-pct">${c.forca}%</span>
    </div>`
            ).join('');
            const recs = (d.recomendacoes || []).map(r => `<div class="rec">${r}</div>`).join('');

            return `<div class="result">
    <p class="result-summary">${d.resumo || ''}</p>

    <div class="result-block">
      <div class="result-block-title">Mercado</div>
      ${kvs(d.mercado)}
    </div>

    <div class="result-block">
      <div class="result-block-title">Público-alvo</div>
      ${kvs({ perfil: d.publico?.perfil, idade: d.publico?.idade, renda: d.publico?.renda })}
      <div style="margin-top:10px"><div class="chip-row">${chips(d.publico?.necessidades)}</div></div>
    </div>

    <div class="result-block">
      <div class="result-block-title">Tendências</div>
      <div class="chip-row">${chips(d.tendencias)}</div>
    </div>

    <div class="result-block">
      <div class="result-block-title">Oportunidades</div>
      <div class="chip-row">${chips(d.oportunidades)}</div>
    </div>

    <div class="result-block">
      <div class="result-block-title">Concorrentes</div>
      <div class="bar-list">${bars}</div>
    </div>

    <div class="result-block">
      <div class="result-block-title">Recomendações</div>
      <div class="rec-list">${recs}</div>
    </div>
  </div>`;
        }

        const labels = {
            potencial: 'Potencial', tam: 'TAM estimado', crescimento: 'Crescimento',
            risco: 'Risco', investimento: 'Investimento inicial', prazo: 'Prazo para operar',
            perfil: 'Perfil', idade: 'Faixa etária', renda: 'Renda'
        };

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>

</html>
