<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Market Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e4e9;
            --muted: #6b7280;
            --accent: #4f8eff;
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 70%;
            height: 80%;
            background: radial-gradient(ellipse at top right, rgba(55, 90, 210, 0.2) 0%, rgba(70, 50, 190, 0.1) 30%, transparent 65%);
            pointer-events: none;
        }

        /* ── HOME ── */
        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .home-title {
            font-size: 30px;
            font-weight: 300;
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 32px;
            color: #c9cdd4;
            line-height: 1.35;
        }

        .home-title strong {
            font-weight: 500;
            color: var(--text);
        }

        .home-title em {
            font-style: italic;
        }

        /* ── INPUT BOX ── */
        .input-box {
            width: 100%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: rgba(255, 255, 255, 0.17);
        }

        textarea {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            padding: 16px 18px 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 300;
            resize: none;
            min-height: 52px;
            max-height: 160px;
            line-height: 1.65;
        }

        textarea::placeholder {
            color: #3d4553;
        }

        .input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px 12px;
        }

        .pills {
            display: flex;
            gap: 5px;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }

        .pill:hover {
            border-color: rgba(255, 255, 255, 0.14);
            color: #9ca3af;
        }

        .pill.on {
            border-color: rgba(79, 142, 255, 0.3);
            color: var(--accent);
            background: rgba(79, 142, 255, 0.06);
        }

        .send-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.09);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .send-btn svg {
            color: #4b5563;
            transition: color 0.15s;
        }

        .send-btn:hover {
            background: rgba(255, 255, 255, 0.11);
        }

        .send-btn.ready {
            background: var(--accent);
            border-color: var(--accent);
        }

        .send-btn.ready svg {
            color: white;
        }

        .hint {
            margin-top: 11px;
            font-size: 11.5px;
            color: #2d3340;
        }

        /* ── CHAT VIEW ── */
        #chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 52px 0 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.05) transparent;
        }

        .msg-wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .msg {
            margin-bottom: 32px;
            animation: up 0.22s ease both;
        }

        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-label {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #2e3541;
            margin-bottom: 8px;
        }

        .msg.user .msg-text {
            display: inline-block;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 14px;
            font-weight: 300;
            color: #c9cdd4;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* ── TYPING ── */
        .typing {
            display: flex;
            gap: 5px;
            padding: 4px 0;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #2e3541;
            animation: blink 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: .3
            }

            40% {
                opacity: 1
            }
        }

        /* ── STREAM RAW ── */
        .stream-raw {
            font-size: 13px;
            color: #374151;
            font-weight: 300;
            line-height: 1.6;
        }

        /* ── SHARED RESULT PARTS ── */
        .result {
            font-size: 13.5px;
            font-weight: 300;
            color: #9ca3af;
        }

        .result-summary {
            font-size: 14px;
            color: #b0b7c3;
            line-height: 1.8;
            margin-bottom: 20px;
            font-weight: 300;
        }

        /* insight box */
        .insight-box {
            background: rgba(79, 142, 255, 0.04);
            border: 1px solid rgba(79, 142, 255, 0.12);
            border-left: 2px solid var(--accent);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #7ba7f7;
            line-height: 1.65;
        }

        .insight-box-label {
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(79, 142, 255, 0.4);
            margin-bottom: 5px;
        }

        /* alert box */
        .alert-box {
            background: rgba(248, 113, 113, 0.04);
            border: 1px solid rgba(248, 113, 113, 0.1);
            border-left: 2px solid var(--red);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: 12.5px;
            color: #f87171;
            opacity: 0.75;
            line-height: 1.5;
        }

        /* blocks */
        .result-block {
            margin-bottom: 22px;
        }

        .result-block-title {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #2e3541;
            margin-bottom: 10px;
            padding-bottom: 7px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .kv-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            gap: 12px;
        }

        .kv-row:last-child {
            border: none;
        }

        .kv-key {
            color: #4b5563;
            flex-shrink: 0;
        }

        .kv-val {
            color: #d1d5db;
            text-align: right;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #6b7280;
        }

        .chip.green {
            border-color: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }

        .chip.yellow {
            border-color: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .chip.red {
            border-color: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        /* bars */
        .bar-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .bar-name {
            width: 130px;
            color: #4b5563;
            font-size: 12.5px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bar-track {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: rgba(79, 142, 255, 0.45);
            border-radius: 2px;
        }

        .bar-pct {
            width: 28px;
            text-align: right;
            color: #374151;
            font-size: 11.5px;
        }

        .bar-fraqueza {
            font-size: 11.5px;
            color: #2e3541;
            font-style: italic;
            flex-shrink: 0;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* recs */
        .rec-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rec {
            padding-left: 14px;
            position: relative;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.65;
        }

        .rec::before {
            content: '—';
            position: absolute;
            left: 0;
            color: #2d3340;
        }

        /* ── COMPARISON ── */
        .compare-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .compare-card {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .compare-card.winner {
            border-color: rgba(79, 142, 255, 0.2);
            background: rgba(79, 142, 255, 0.03);
        }

        .compare-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .compare-name {
            font-size: 13.5px;
            font-weight: 500;
            color: #c9cdd4;
        }

        .compare-score {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #6b7280;
        }

        .compare-score.high {
            background: rgba(79, 142, 255, 0.1);
            color: var(--accent);
        }

        .compare-lists {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
        }

        .compare-col {
            flex: 1;
        }

        .compare-col-label {
            font-size: 9.5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #2e3541;
            margin-bottom: 5px;
        }

        .compare-item {
            font-size: 12px;
            color: #6b7280;
            padding: 2px 0;
            line-height: 1.5;
        }

        .compare-item.pro {
            color: #34d399;
            opacity: 0.8;
        }

        .compare-item.con {
            color: #f87171;
            opacity: 0.7;
        }

        .compare-ideal {
            font-size: 11.5px;
            color: #374151;
            font-style: italic;
        }

        .veredicto {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.65;
            margin-bottom: 16px;
        }

        /* ── STRATEGY ── */
        .phase-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .phase-card {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
        }

        .phase-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .phase-name {
            font-size: 13px;
            font-weight: 500;
            color: #c9cdd4;
        }

        .phase-prazo {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            color: #4b5563;
        }

        .phase-acoes {
            margin-bottom: 8px;
        }

        .phase-acao {
            font-size: 12.5px;
            color: #6b7280;
            padding: 2px 0 2px 12px;
            position: relative;
            line-height: 1.5;
        }

        .phase-acao::before {
            content: '·';
            position: absolute;
            left: 2px;
            color: #2e3541;
        }

        .phase-meta {
            font-size: 11.5px;
            color: #4f8eff;
            opacity: 0.7;
            font-weight: 400;
        }

        /* ── INSIGHT (type 4) ── */
        .insight-point-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .insight-point {
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            padding-left: 14px;
        }

        .insight-point-title {
            font-size: 13px;
            font-weight: 500;
            color: #c9cdd4;
            margin-bottom: 4px;
        }

        .insight-point-text {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.65;
        }

        .conclusao-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.65;
            margin-bottom: 14px;
        }

        /* ── CHAT INPUT ── */
        #chat-input-area {
            padding: 14px 20px 22px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
        }

        .chat-input-inner {
            max-width: 720px;
            margin: 0 auto;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        /* ── VIABILITY SCORE ── */
        .viability-wrap {
            margin-bottom: 22px;
        }

        .viability-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .viability-score-big {
            font-size: 36px;
            font-weight: 300;
            color: var(--accent);
            letter-spacing: -1px;
            line-height: 1;
        }

        .viability-score-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #2e3541;
            margin-top: 3px;
        }

        .viability-badge {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .viability-badge.high   { background: rgba(52,211,153,.1); color: var(--green); }
        .viability-badge.medium { background: rgba(251,191,36,.1);  color: var(--yellow); }
        .viability-badge.low    { background: rgba(248,113,113,.1); color: var(--red); }

        .viability-dims {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .viability-dim {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .viability-dim-label {
            width: 90px;
            color: #4b5563;
            flex-shrink: 0;
        }

        .viability-dim-track {
            flex: 1;
            height: 2px;
            background: rgba(255,255,255,.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .viability-dim-fill {
            height: 100%;
            border-radius: 2px;
            background: rgba(79,142,255,.5);
        }

        .viability-dim-val {
            width: 26px;
            text-align: right;
            color: #374151;
            font-size: 11px;
        }

        /* ── CANVAS ── */
        .canvas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .canvas-cell {
            background: rgba(255,255,255,.025);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .canvas-cell.full { grid-column: 1 / -1; }
        .canvas-cell.accent { border-color: rgba(79,142,255,.18); background: rgba(79,142,255,.04); }

        .canvas-cell-label {
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #2e3541;
            margin-bottom: 8px;
        }

        .canvas-cell.accent .canvas-cell-label { color: rgba(79,142,255,.5); }

        .canvas-proposta {
            font-size: 13.5px;
            color: #c9cdd4;
            font-weight: 400;
            line-height: 1.5;
        }

        .canvas-items {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .canvas-item {
            font-size: 12px;
            color: #6b7280;
            padding-left: 10px;
            position: relative;
            line-height: 1.5;
        }

        .canvas-item::before {
            content: '·';
            position: absolute;
            left: 1px;
            color: #2e3541;
        }

        /* ── ARENA ── */
        .arena-split {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            margin-bottom: 20px;
            align-items: start;
        }

        .arena-side {
            background: rgba(255,255,255,.025);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 10px;
            padding: 16px;
        }

        .arena-side.winner {
            border-color: rgba(79,142,255,.25);
            background: rgba(79,142,255,.04);
        }

        .arena-side-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .arena-side-name {
            font-size: 14px;
            font-weight: 500;
            color: #c9cdd4;
        }

        .arena-side-score {
            font-size: 22px;
            font-weight: 300;
            color: #4b5563;
        }

        .arena-side.winner .arena-side-score { color: var(--accent); }

        .arena-section-label {
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #2e3541;
            margin: 10px 0 5px;
        }

        .arena-item { font-size: 12px; color: #6b7280; padding: 2px 0 2px 10px; position: relative; line-height: 1.45; }
        .arena-item::before { content: '·'; position: absolute; left: 1px; color: #2e3541; }
        .arena-item.adv { color: #34d399; opacity: .8; }
        .arena-item.vuln { color: #f87171; opacity: .7; }

        .arena-strategy {
            margin-top: 10px;
            padding: 8px 10px;
            background: rgba(255,255,255,.03);
            border-radius: 6px;
            font-size: 11.5px;
            color: #4b5563;
            line-height: 1.5;
            font-style: italic;
        }

        .arena-vs {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding-top: 30px;
        }

        .arena-vs-text {
            font-size: 11px;
            font-weight: 600;
            color: #2e3541;
            letter-spacing: .1em;
        }

        .arena-winner-badge {
            font-size: 10px;
            padding: 3px 9px;
            border-radius: 20px;
            background: rgba(79,142,255,.1);
            color: var(--accent);
            font-weight: 500;
            white-space: nowrap;
        }

        .arena-justificativa {
            background: rgba(255,255,255,.02);
            border: 1px solid rgba(255,255,255,.05);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.65;
            margin-bottom: 16px;
        }

        /* ── EXPORT / HISTORY TOOLBAR ── */
        .nexus-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .nexus-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,.08);
            background: none;
            color: #4b5563;
            font-size: 11.5px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all .15s;
        }

        .nexus-btn:hover {
            border-color: rgba(255,255,255,.14);
            color: #9ca3af;
        }

        /* ── HISTORY PANEL ── */
        #history-panel {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 300px; height: 100vh;
            background: #0d1018;
            border-left: 1px solid rgba(255,255,255,.06);
            z-index: 100;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        #history-panel.open { display: flex; }

        .history-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: #2e3541;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-close {
            cursor: pointer;
            color: #374151;
            font-size: 16px;
            line-height: 1;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,.05);
            background: rgba(255,255,255,.02);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all .15s;
        }

        .history-item:hover { border-color: rgba(255,255,255,.1); }

        .history-item-q {
            font-size: 12.5px;
            color: #c9cdd4;
            font-weight: 300;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-time {
            font-size: 10.5px;
            color: #2e3541;
        }
    </style>
</head>

<body>

    <!-- HOME -->
    <div id="home">
        <p class="home-title">
            <strong>Market Intelligence</strong> — entenda o<br>
            mercado da sua <em>região</em> antes de agir
        </p>

        <div class="input-box">
            <textarea id="home-input" placeholder="Descreva seu negócio, produto ou ideia e a região..." rows="1"
                oninput="resize(this); ready(this,'home-send')" onkeydown="hotkey(event,'home')"></textarea>
            <div class="input-footer">
                <div class="pills">
                    <button class="pill on" onclick="this.classList.toggle('on')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        Deep Analyze
                    </button>
                    <button class="pill" onclick="this.classList.toggle('on')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                            <circle cx="12" cy="9" r="2.5" />
                        </svg>
                        Região
                    </button>
                    <button class="pill" onclick="this.classList.toggle('on')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                            <polyline points="17 6 23 6 23 12" />
                        </svg>
                        Trends
                    </button>
                    <button class="pill" id="arena-pill" onclick="toggleArena(this)">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <line x1="12" y1="3" x2="12" y2="21"/><path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/>
                        </svg>
                        Arena
                    </button>
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
                    <button class="send-btn" title="Histórico" onclick="document.getElementById('history-panel').classList.toggle('open')" style="background:none;border-color:rgba(255,255,255,.06)">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </button>
                    <button class="send-btn" id="home-send" onclick="start()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <p class="hint">Enter para enviar · Shift+Enter para nova linha</p>
    </div>

    <!-- CHAT -->
    <div id="chat-view">
        <div id="messages">
            <div class="msg-wrap" id="msg-wrap"></div>
        </div>

        <div id="chat-input-area">
            <div class="chat-input-inner">
                <div class="input-box">
                    <textarea id="chat-input" placeholder="Continue a análise ou faça uma nova pergunta..." rows="1"
                        oninput="resize(this); ready(this,'chat-send')" onkeydown="hotkey(event,'chat')"></textarea>
                    <div class="input-footer">
                        <div class="pills">
                            <button class="pill on" onclick="this.classList.toggle('on')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                                Deep Analyze
                            </button>
                            <button class="pill" onclick="this.classList.toggle('on')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
                                    <circle cx="12" cy="9" r="2.5" />
                                </svg>
                                Região
                            </button>
                            <button class="pill" onclick="this.classList.toggle('on')">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2">
                                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                                    <polyline points="17 6 23 6 23 12" />
                                </svg>
                                Trends
                            </button>
                            <button class="pill" onclick="toggleArena(this)">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                    <line x1="12" y1="3" x2="12" y2="21"/><path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/>
                                </svg>
                                Arena
                            </button>
                        </div>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <button class="send-btn" title="Exportar PDF" onclick="exportPDF()" style="background:none;border-color:rgba(255,255,255,.06)">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                            </button>
                            <button class="send-btn" title="Histórico" onclick="document.getElementById('history-panel').classList.toggle('open')" style="background:none;border-color:rgba(255,255,255,.06)">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </button>
                            <button class="send-btn" id="chat-send" onclick="send()">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <line x1="22" y1="2" x2="11" y2="13" />
                                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="history-panel">
        <div class="history-title">
            Histórico de sessão
            <span class="history-close" onclick="document.getElementById('history-panel').classList.remove('open')">✕</span>
        </div>
        <div id="history-list"></div>
    </div>

    <script>
        const API = '/api/chat';
        let history = [];
        let busy = false;
        let arenaMode = false;
        let sessionId = 'session_' + Date.now();
        let sessionHistory = []; // [{q, time}]

        function resize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        function ready(el, id) {
            document.getElementById(id).classList.toggle('ready', el.value.trim() !== '');
        }

        function hotkey(e, ctx) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                ctx === 'home' ? start() : send();
            }
        }

        function toggleArena(btn) {
            arenaMode = !arenaMode;
            btn.classList.toggle('on', arenaMode);
            const allArenaPills = document.querySelectorAll('[onclick*="toggleArena"]');
            allArenaPills.forEach(p => p.classList.toggle('on', arenaMode));
        }

        function start() {
            const v = document.getElementById('home-input').value.trim();
            if (!v) return;
            document.getElementById('home').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            process(v);
        }

        function send() {
            if (busy) return;
            const el = document.getElementById('chat-input');
            const v = el.value.trim();
            if (!v) return;
            el.value = ''; el.style.height = 'auto';
            document.getElementById('chat-send').classList.remove('ready');
            process(v);
        }

        function addMsg(role, html) {
            const wrap = document.getElementById('msg-wrap');
            const d = document.createElement('div');
            d.className = 'msg ' + role;
            d.innerHTML = `<div class="msg-label">${role === 'user' ? 'Você' : 'Nexus'}</div>${html}`;
            wrap.appendChild(d);
            scroll();
            return d;
        }

        function scroll() {
            const m = document.getElementById('messages');
            setTimeout(() => m.scrollTop = m.scrollHeight, 30);
        }

        function addHistoryItem(q) {
            const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            sessionHistory.unshift({ q, time });
            const list = document.getElementById('history-list');
            list.innerHTML = sessionHistory.map((h, i) => `
                <div class="history-item" onclick="rerunQuery(${i})">
                    <div class="history-item-q">${esc(h.q)}</div>
                    <div class="history-item-time">${h.time}</div>
                </div>`).join('');
        }

        function rerunQuery(idx) {
            document.getElementById('history-panel').classList.remove('open');
            const q = sessionHistory[idx]?.q;
            if (!q || busy) return;
            process(q);
        }

        // ── PDF EXPORT ────────────────────────────────────────────────────────
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            let y = 20;
            const margin = 18;
            const pageW = 210;
            const maxW = pageW - margin * 2;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(18);
            doc.setTextColor(30, 35, 50);
            doc.text('Nexus — Market Intelligence', margin, y);
            y += 8;
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(100, 110, 130);
            doc.text(new Date().toLocaleString('pt-BR'), margin, y);
            y += 10;
            doc.setDrawColor(50, 55, 80);
            doc.setLineWidth(0.3);
            doc.line(margin, y, pageW - margin, y);
            y += 8;

            const msgs = document.querySelectorAll('.msg');
            msgs.forEach(msg => {
                const isUser = msg.classList.contains('user');
                const textEls = msg.querySelectorAll('.msg-text, .result-summary, .kv-val, .chip, .rec, .phase-acao, .insight-point-text, .canvas-proposta, .canvas-item, .arena-item');
                if (!textEls.length) return;

                if (y > 265) { doc.addPage(); y = 20; }

                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8);
                doc.setTextColor(isUser ? 79 : 52, isUser ? 142 : 211, isUser ? 255 : 153);
                doc.text(isUser ? 'VOCÊ' : 'NEXUS', margin, y);
                y += 5;

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);
                doc.setTextColor(50, 55, 70);

                textEls.forEach(el => {
                    const txt = el.textContent.trim();
                    if (!txt) return;
                    const lines = doc.splitTextToSize(txt, maxW);
                    lines.forEach(line => {
                        if (y > 270) { doc.addPage(); y = 20; }
                        doc.text(line, margin, y);
                        y += 5;
                    });
                });
                y += 4;
            });

            doc.save(`nexus-analise-${Date.now()}.pdf`);
        }

        async function process(text) {
            if (busy) return;
            busy = true;

            // If arena mode, prefix the query
            const effectiveText = arenaMode
                ? `[MODO ARENA] ${text} — responda com type "arena" comparando os dois lados como adversários diretos`
                : text;

            history.push({ role: 'user', content: effectiveText });
            addMsg('user', `<div class="msg-text">${esc(text)}${arenaMode ? ' <span style="font-size:10px;color:#4f8eff;opacity:.7">⚔ Arena</span>' : ''}</div>`);
            addHistoryItem(text);

            const wrap = document.getElementById('msg-wrap');
            const td = document.createElement('div');
            td.className = 'msg ai';
            td.innerHTML = `<div class="msg-label">Nexus</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            wrap.appendChild(td); scroll();

            let raw = '';

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history, sessionId }),
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                td.remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerHTML = `<div class="msg-label">Nexus</div><div class="stream-raw"></div>`;
                wrap.appendChild(aiDiv);
                const streamEl = aiDiv.querySelector('.stream-raw');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.slice(6).trim();
                        if (payload === '[DONE]') continue;
                        try {
                            const { delta } = JSON.parse(payload);
                            raw += delta;
                            streamEl.textContent = raw;
                            scroll();
                        } catch { }
                    }
                }

                history.push({ role: 'assistant', content: raw });

                // Parse and render
                let parsed = null;
                try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); } catch { }

                if (parsed && parsed.type) {
                    streamEl.remove();
                    const resultDiv = document.createElement('div');
                    resultDiv.innerHTML = render(parsed);
                    aiDiv.appendChild(resultDiv);

                    // Add export toolbar under each AI response
                    const toolbar = document.createElement('div');
                    toolbar.className = 'nexus-toolbar';
                    toolbar.innerHTML = `
                        <button class="nexus-btn" onclick="exportPDF()">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            Exportar PDF
                        </button>`;
                    aiDiv.appendChild(toolbar);
                } else if (parsed) {
                    streamEl.remove();
                    const resultDiv = document.createElement('div');
                    resultDiv.innerHTML = renderMarketAnalysis(parsed);
                    aiDiv.appendChild(resultDiv);
                } else {
                    streamEl.style.cssText = 'font-size:14px;color:#9ca3af;line-height:1.75;font-weight:300';
                }
                scroll();

            } catch (err) {
                td.remove();
                addMsg('ai', `<div class="msg-text" style="color:#4b5563">Erro: ${esc(err.message)}</div>`);
            }

            busy = false;
        }

        /* ── MASTER ROUTER ── */
        function render(d) {
            switch (d.type) {
                case 'market_analysis': return renderMarketAnalysis(d);
                case 'comparison':      return renderComparison(d);
                case 'strategy':        return renderStrategy(d);
                case 'insight':         return renderInsight(d);
                case 'canvas':          return renderCanvas(d);
                case 'arena':           return renderArena(d);
                default:                return renderInsight(d);
            }
        }

        /* ── HELPERS ── */
        const e = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const chips = (arr, color) => (arr || []).map(x => `<span class="chip${color ? ' ' + color : ''}">${e(x)}</span>`).join('');
        const recs = arr => (arr || []).map(r => `<div class="rec">${e(r)}</div>`).join('');
        const kvs = (obj, map) => Object.entries(obj || {}).filter(([, v]) => v)
            .map(([k, v]) => `<div class="kv-row"><span class="kv-key">${e(map[k] || k)}</span><span class="kv-val">${e(v)}</span></div>`).join('');

        const block = (title, html) => html ? `
            <div class="result-block">
                <div class="result-block-title">${title}</div>
                ${html}
            </div>` : '';

        const insightBox = txt => txt ? `
            <div class="insight-box">
                <div class="insight-box-label">Insight estratégico</div>
                ${e(txt)}
            </div>` : '';

        const alertBoxes = arr => (arr || []).map(a => `<div class="alert-box">⚠ ${e(a)}</div>`).join('');

        /* ── VIABILITY SCORE ── */
        function renderViability(v) {
            if (!v || !v.score) return '';
            const score = v.score;
            const badge = score >= 70 ? 'high' : score >= 50 ? 'medium' : 'low';
            const label = score >= 70 ? 'Alta viabilidade' : score >= 50 ? 'Viabilidade média' : 'Baixa viabilidade';
            const dimLabels = { mercado: 'Mercado', competicao: 'Competição', execucao: 'Execução', financeiro: 'Financeiro', timing: 'Timing' };
            const dims = Object.entries(v.breakdown || {}).map(([k, val]) => `
                <div class="viability-dim">
                    <span class="viability-dim-label">${dimLabels[k] || k}</span>
                    <div class="viability-dim-track"><div class="viability-dim-fill" style="width:${val}%"></div></div>
                    <span class="viability-dim-val">${val}</span>
                </div>`).join('');
            return `
                <div class="result-block viability-wrap">
                    <div class="result-block-title">Score de Viabilidade</div>
                    <div class="viability-header">
                        <div>
                            <div class="viability-score-big">${score}<span style="font-size:16px;color:#374151">/100</span></div>
                            <div class="viability-score-label">Índice Nexus</div>
                        </div>
                        <span class="viability-badge ${badge}">${label}</span>
                    </div>
                    <div class="viability-dims">${dims}</div>
                </div>`;
        }

        /* ── TYPE 1: MARKET ANALYSIS ── */
        function renderMarketAnalysis(d) {
            const LABELS = {
                potencial: 'Potencial', tam: 'TAM estimado', crescimento: 'Crescimento',
                risco: 'Risco', investimento: 'Investimento inicial', prazo: 'Prazo para operar',
                perfil: 'Perfil', idade: 'Faixa etária', renda: 'Renda'
            };

            const bars = (d.concorrentes || []).map(c => `
                <div class="bar-item">
                    <span class="bar-name">${e(c.nome)}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${c.forca || 0}%"></div></div>
                    <span class="bar-pct">${c.forca || 0}%</span>
                    ${c.fraqueza ? `<span class="bar-fraqueza">${e(c.fraqueza)}</span>` : ''}
                </div>`).join('');

            return `<div class="result">
                <p class="result-summary">${e(d.resumo)}</p>
                ${insightBox(d.insight)}
                ${renderViability(d.viabilidade)}
                ${block('Mercado', kvs(d.mercado, LABELS))}
                ${block('Público-alvo', `
                    ${kvs({ perfil: d.publico?.perfil, idade: d.publico?.idade, renda: d.publico?.renda }, LABELS)}
                    <div style="margin-top:10px"><div class="chip-row">${chips(d.publico?.necessidades)}</div></div>
                `)}
                ${block('Tendências', `<div class="chip-row">${chips(d.tendencias)}</div>`)}
                ${block('Oportunidades', `<div class="chip-row">${chips(d.oportunidades, 'green')}</div>`)}
                ${d.diferenciais?.length ? block('Diferenciais competitivos', `<div class="chip-row">${chips(d.diferenciais, 'yellow')}</div>`) : ''}
                ${block('Concorrentes', `<div class="bar-list">${bars}</div>`)}
                ${block('Recomendações', `<div class="rec-list">${recs(d.recomendacoes)}</div>`)}
                ${d.alertas?.length ? block('Alertas', alertBoxes(d.alertas)) : ''}
            </div>`;
        }

        /* ── TYPE 2: COMPARISON ── */
        function renderComparison(d) {
            const maxScore = Math.max(...(d.itens || []).map(i => i.score || 0));
            const cards = (d.itens || []).map(item => {
                const isWinner = item.score === maxScore;
                const pros = (item.pros || []).map(p => `<div class="compare-item pro">+ ${e(p)}</div>`).join('');
                const cons = (item.contras || []).map(c => `<div class="compare-item con">− ${e(c)}</div>`).join('');
                return `
                <div class="compare-card${isWinner ? ' winner' : ''}">
                    <div class="compare-header">
                        <span class="compare-name">${e(item.nome)}${isWinner ? ' ✦' : ''}</span>
                        <span class="compare-score${item.score >= 70 ? ' high' : ''}">${item.score || 0}/100</span>
                    </div>
                    <div class="compare-lists">
                        <div class="compare-col">
                            <div class="compare-col-label">Prós</div>
                            ${pros}
                        </div>
                        <div class="compare-col">
                            <div class="compare-col-label">Contras</div>
                            ${cons}
                        </div>
                    </div>
                    ${item.ideal_para ? `<div class="compare-ideal">Ideal para: ${e(item.ideal_para)}</div>` : ''}
                </div>`;
            }).join('');

            return `<div class="result">
                <p class="result-summary">${e(d.resumo)}</p>
                ${insightBox(d.insight)}
                <div class="compare-grid">${cards}</div>
                ${d.veredicto ? `<div class="veredicto">${e(d.veredicto)}</div>` : ''}
                ${d.recomendacoes?.length ? block('Recomendações', `<div class="rec-list">${recs(d.recomendacoes)}</div>`) : ''}
            </div>`;
        }

        /* ── TYPE 3: STRATEGY ── */
        function renderStrategy(d) {
            const phases = (d.fases || []).map(f => `
                <div class="phase-card">
                    <div class="phase-header">
                        <span class="phase-name">${e(f.fase)}</span>
                        <span class="phase-prazo">${e(f.prazo)}</span>
                    </div>
                    <div class="phase-acoes">
                        ${(f.acoes || []).map(a => `<div class="phase-acao">${e(a)}</div>`).join('')}
                    </div>
                    ${f.meta ? `<div class="phase-meta">→ ${e(f.meta)}</div>` : ''}
                </div>`).join('');

            return `<div class="result">
                <p class="result-summary">${e(d.resumo)}</p>
                ${insightBox(d.insight)}
                ${block('Plano de execução', `<div class="phase-list">${phases}</div>`)}
                ${d.kpis?.length ? block('KPIs-chave', `<div class="rec-list">${recs(d.kpis)}</div>`) : ''}
                ${d.recomendacoes?.length ? block('Recomendações', `<div class="rec-list">${recs(d.recomendacoes)}</div>`) : ''}
                ${d.alertas?.length ? block('Alertas', alertBoxes(d.alertas)) : ''}
            </div>`;
        }

        /* ── TYPE 4: INSIGHT ── */
        function renderInsight(d) {
            const points = (d.pontos || []).map(p => `
                <div class="insight-point">
                    <div class="insight-point-title">${e(p.titulo)}</div>
                    <div class="insight-point-text">${e(p.texto)}</div>
                </div>`).join('');

            return `<div class="result">
                <p class="result-summary">${e(d.resumo)}</p>
                ${d.pontos?.length ? `<div class="insight-point-list">${points}</div>` : ''}
                ${d.exemplos?.length ? block('Exemplos', `<div class="chip-row">${chips(d.exemplos)}</div>`) : ''}
                ${d.conclusao ? `<div class="conclusao-box">${e(d.conclusao)}</div>` : ''}
                ${d.proximos_passos?.length ? block('Próximos passos', `<div class="rec-list">${recs(d.proximos_passos)}</div>`) : ''}
            </div>`;
        }

        /* ── TYPE 5: CANVAS ── */
        function renderCanvas(d) {
            const canvasItems = arr => (arr || []).map(i => `<div class="canvas-item">${e(i)}</div>`).join('');
            return `<div class="result">
                <p class="result-summary">${e(d.resumo)}</p>
                ${insightBox(d.insight)}
                ${renderViability(d.viabilidade)}
                <div class="result-block">
                    <div class="result-block-title">Business Model Canvas</div>
                    <div class="canvas-grid">
                        <div class="canvas-cell full accent">
                            <div class="canvas-cell-label">Proposta de Valor</div>
                            <div class="canvas-proposta">${e(d.proposta)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Segmentos de Clientes</div>
                            <div class="canvas-items">${canvasItems(d.segmentos)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Canais</div>
                            <div class="canvas-items">${canvasItems(d.canais)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Relacionamento</div>
                            <div class="canvas-items">${canvasItems(d.relacionamento)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Fontes de Receita</div>
                            <div class="canvas-items">${canvasItems(d.receitas)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Recursos-chave</div>
                            <div class="canvas-items">${canvasItems(d.recursos)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Atividades-chave</div>
                            <div class="canvas-items">${canvasItems(d.atividades)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Parceiros Estratégicos</div>
                            <div class="canvas-items">${canvasItems(d.parceiros)}</div>
                        </div>
                        <div class="canvas-cell">
                            <div class="canvas-cell-label">Estrutura de Custos</div>
                            <div class="canvas-items">${canvasItems(d.custos)}</div>
                        </div>
                    </div>
                </div>
                ${d.recomendacoes?.length ? block('Recomendações', `<div class="rec-list">${recs(d.recomendacoes)}</div>`) : ''}
            </div>`;
        }

        /* ── TYPE 6: ARENA ── */
        function renderArena(d) {
            const winnerA = d.vencedor === 'A' || d.vencedor === d.lado_a?.nome;
            const sideHTML = (side, isWinner) => {
                const adv  = (side.vantagens || []).map(v => `<div class="arena-item adv">${e(v)}</div>`).join('');
                const vuln = (side.vulnerabilidades || []).map(v => `<div class="arena-item vuln">${e(v)}</div>`).join('');
                return `
                    <div class="arena-side${isWinner ? ' winner' : ''}">
                        <div class="arena-side-header">
                            <span class="arena-side-name">${e(side.nome)}${isWinner ? ' ✦' : ''}</span>
                            <span class="arena-side-score">${side.score || 0}</span>
                        </div>
                        <div class="arena-section-label">Vantagens</div>
                        ${adv}
                        <div class="arena-section-label">Vulnerabilidades</div>
                        ${vuln}
                        ${side.estrategia ? `<div class="arena-strategy">→ ${e(side.estrategia)}</div>` : ''}
                    </div>`;
            };

            return `<div class="result">
                <p class="result-summary">${e(d.resumo)}</p>
                ${insightBox(d.insight)}
                <div class="arena-split">
                    ${sideHTML(d.lado_a || {}, winnerA)}
                    <div class="arena-vs">
                        <span class="arena-vs-text">VS</span>
                        <span class="arena-winner-badge">${e(winnerA ? d.lado_a?.nome : d.lado_b?.nome)} vence</span>
                    </div>
                    ${sideHTML(d.lado_b || {}, !winnerA)}
                </div>
                ${d.justificativa ? `<div class="arena-justificativa">${e(d.justificativa)}</div>` : ''}
                ${d.recomendacoes?.length ? block('Recomendações', `<div class="rec-list">${recs(d.recomendacoes)}</div>`) : ''}
            </div>`;
        }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>

</html>
